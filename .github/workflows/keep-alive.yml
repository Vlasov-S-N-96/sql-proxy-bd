name: Keep Supabase Alive

on:
  schedule:
    # Запуск каждый день в 12:00 по UTC (15:00 по Москве)
    - cron: '0 12 * * *'
  # Добавляем возможность запустить вручную из вкладки Actions
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send a ping to keep the database awake
        run: |
          curl -X GET 'https://vsupejvnbvchbawoxqyh.supabase.co/rest/v1/characters?limit=1' \
          -H "apikey: sb_publishable_uGUPHzFbbyNGnMhZuZdPdA_XkqZyxLU" \
          -H "Authorization: Bearer sb_publishable_uGUPHzFbbyNGnMhZuZdPdA_XkqZyxLU"